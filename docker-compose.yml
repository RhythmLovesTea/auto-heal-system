
services:

  # ── Autoheal backend ──────────────────────────────────────────
  autoheal:
    build:
      context: .
      dockerfile: docker/Dockerfile.autoheal
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=your_key_here
      - SLACK_WEBHOOK_URL=your_slack_webhook_here
      - REDIS_URL=redis://redis:6379
      - DB_PATH=/data/autoheal.db
    volumes:
      - sqlite_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
      - auth-service
      - db-client
      - nginx-victim
      - payments-api
      - worker

  # ── Redis (event bus) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ── Dashboard (React frontend) ────────────────────────────────
  dashboard:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./dashboard:/app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    depends_on:
      - autoheal

  # ── Victim containers ─────────────────────────────────────────
  auth-service:
    build: ./victims/auth-service
    ports:
      - "5001:5000"

  db-client:
    build: ./victims/db-client
    ports:
      - "5002:5000"

  nginx-victim:
    build: ./victims/nginx
    ports:
      - "5003:5000"

  payments-api:
    build: ./victims/payments-api
    ports:
      - "5004:5000"

  worker:
    build: ./victims/worker
    ports:
      - "5005:5000"

volumes:
  sqlite_data:
